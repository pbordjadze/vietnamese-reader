const GEORGIAN_RANGE = /^[\u10A0-\u10FF\u1C90-\u1CBF\u2D00-\u2D2F]+$/;

function isGeorgianWord(s) {
  const cleaned = s.replace(/[\u200B-\u200D\uFEFF]/g, "");
  return GEORGIAN_RANGE.test(cleaned);
}

function validateStory(story) {
  if (!story || typeof story !== "object") throw new Error("not an object");
  if (!story.title || !story.titleEn || !story.sentences) throw new Error("missing required fields");
  if (!Array.isArray(story.sentences) || story.sentences.length === 0) throw new Error("no sentences");
  story.sentences.forEach((s, si) => {
    if (!Array.isArray(s.words) || s.words.length === 0) throw new Error(`sentence ${si}: no words`);
    if (!s.english) throw new Error(`sentence ${si}: missing english`);
    s.words.forEach((w, wi) => {
      if (!w.word || !w.gloss) throw new Error(`sentence ${si} word ${wi}: missing word or gloss`);
      if (!isGeorgianWord(w.word)) {
        throw new Error(`sentence ${si} word ${wi}: "${w.word}" contains non-Georgian characters`);
      }
    });
    if (s.trailing && /[a-zA-Z\u10A0-\u10FF]/.test(s.trailing)) {
      throw new Error(`sentence ${si}: trailing should be punctuation only, got "${s.trailing}"`);
    }
  });
  return true;
}

function normalizeSentence(sentence) {
  if (sentence.midPunctuation && sentence.extraWords) {
    const tokens = [];
    sentence.words.forEach((w, i) => {
      tokens.push({ type: "word", ...w });
      if (i === sentence.midPunctuation.afterIndex) {
        tokens.push({ type: "punct", text: sentence.midPunctuation.mark });
      }
    });
    sentence.extraWords.forEach((w) => tokens.push({ type: "word", ...w }));
    if (sentence.trailing) tokens.push({ type: "punct", text: sentence.trailing });
    return tokens;
  }
  const tokens = sentence.words.map((w) => ({ type: "word", ...w }));
  if (sentence.trailing) tokens.push({ type: "punct", text: sentence.trailing });
  return tokens;
}

const SAVED_WORDS_KEY = "georgian-reader:saved-words";
const STORIES_KEY = "georgian-reader:stories";
const ARCHIVED_KEY = "georgian-reader:archived-story-ids";
const API_KEY_KEY = "georgian-reader:claude-api-key";

const storage = {
  get(key) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch (e) { return null; }
  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
  },
};

const STORY_SYSTEM_PROMPT = `You are a Georgian language learning content generator.
Output ONLY a single valid JSON object — no markdown, no code fences, no commentary, just raw JSON.

The JSON must match this schema exactly:
{
  "id": "kebab-case-id",
  "title": "Georgian title (Georgian script only)",
  "titleEn": "English title",
  "description": "One sentence English description",
  "difficulty": "A2",
  "sentences": [
    {
      "words": [{"word": "Georgian", "gloss": "English meaning (morphological note)"}],
      "english": "Full English translation of the sentence",
      "trailing": "."
    }
  ]
}

Critical rules:
- Every "word" value must contain ONLY Georgian Unicode characters (ა–ჿ). No Latin letters, digits, punctuation, or spaces inside a word value.
- Punctuation goes ONLY in "trailing" (e.g. ".", "?", "!") — never embedded inside a "word".
- For a sentence with a mid-sentence comma separating two clauses, add "midPunctuation": {"afterIndex": N, "mark": ","} where N is the 0-based index of the last word of the first clause, and put the second clause words in "extraWords": [...] (same format as "words").
- "trailing" must be a punctuation character only — no letters.
- Aim for 8–12 sentences.
- Glosses should be concise: base meaning plus a brief morphological note in parentheses, e.g. "goes (3sg present)".
- Do NOT include a "source" field.`;

function stripJsonFences(text) {
  return text.replace(/^```(?:json)?\s*/i, "").replace(/\s*```\s*$/i, "").trim();
}

async function callClaude(apiKey, userMessage, systemPrompt, model = "claude-opus-4-6", maxTokens = 4096) {
  const body = {
    model,
    max_tokens: maxTokens,
    messages: [{ role: "user", content: userMessage }],
  };
  if (systemPrompt) body.system = systemPrompt;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-allow-browser": "true",
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const errBody = await res.json().catch(() => ({}));
    throw new Error(errBody?.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.content[0].text;
}

function shuffleArray(arr) {
  const out = [...arr];
  for (let i = out.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [out[i], out[j]] = [out[j], out[i]];
  }
  return out;
}

function sampleLearningWords(savedWords, n = 6) {
  const learning = savedWords.filter((w) => w.status === "learning");
  return shuffleArray(learning).slice(0, n);
}

function downloadJson(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function GeorgianReader() {
  const [view, setView] = useState("menu");
  const [stories, setStories] = useState([SEED_STORY]);
  const [archivedIds, setArchivedIds] = useState([]);
  const [showArchived, setShowArchived] = useState(false);
  const [activeStoryId, setActiveStoryId] = useState(null);
  const [sentenceIdx, setSentenceIdx] = useState(0);
  const [showTranslation, setShowTranslation] = useState(false);
  const [popup, setPopup] = useState(null);
  const [savedWords, setSavedWords] = useState([]);
  const [showKnown, setShowKnown] = useState(false);
  const [showImporter, setShowImporter] = useState(false);
  const [importJson, setImportJson] = useState("");
  const [importError, setImportError] = useState(null);
  const [importSuccess, setImportSuccess] = useState(null);
  const [claudeApiKey, setClaudeApiKey] = useState("");
  const [showGenerator, setShowGenerator] = useState(false);
  const [generatePrompt, setGeneratePrompt] = useState("");
  const [generateDifficulty, setGenerateDifficulty] = useState("A2");
  const [generateLoading, setGenerateLoading] = useState(false);
  const [generateError, setGenerateError] = useState(null);
  const [generateSuccess, setGenerateSuccess] = useState(null);
  const [sampledWords, setSampledWords] = useState([]);
  const [keyTestState, setKeyTestState] = useState(null);
  const [flashcards, setFlashcards] = useState([]);
  const [flashIdx, setFlashIdx] = useState(0);
  const [flashFlipped, setFlashFlipped] = useState(false);
  const containerRef = useRef(null);
  const fileInputRef = useRef(null);

  const activeStory = stories.find((s) => s.id === activeStoryId);
  const sentence = activeStory ? activeStory.sentences[sentenceIdx] : null;
  const tokens = sentence ? normalizeSentence(sentence) : [];

  useEffect(() => {
    const w = storage.get(SAVED_WORDS_KEY);
    if (Array.isArray(w)) setSavedWords(w);
    const s = storage.get(STORIES_KEY);
    if (Array.isArray(s) && s.length > 0) {
      const hasSeed = s.some((x) => x.id === SEED_STORY.id);
      setStories(hasSeed ? s : [SEED_STORY, ...s]);
    }
    const a = storage.get(ARCHIVED_KEY);
    if (Array.isArray(a)) setArchivedIds(a);
    const k = storage.get(API_KEY_KEY);
    if (typeof k === "string" && k) setClaudeApiKey(k);
  }, []);

  useEffect(() => {
    setShowTranslation(false);
    setPopup(null);
  }, [sentenceIdx, activeStoryId]);

  useEffect(() => {
    const handleClick = (e) => {
      if (popup && !e.target.closest("[data-word]") && !e.target.closest("[data-popup]")) {
        setPopup(null);
      }
    };
    document.addEventListener("click", handleClick);
    return () => document.removeEventListener("click", handleClick);
  }, [popup]);

  const isWordSaved = (word) => savedWords.some((w) => w.word === word);

  const persistWords = (updated) => {
    setSavedWords(updated);
    storage.set(SAVED_WORDS_KEY, updated);
  };

  const persistStories = (updated) => {
    setStories(updated);
    const toStore = updated.filter((s) => s.source !== "seed");
    storage.set(STORIES_KEY, toStore);
  };

  const persistArchived = (updated) => {
    setArchivedIds(updated);
    storage.set(ARCHIVED_KEY, updated);
  };

  const persistApiKey = (key) => {
    setClaudeApiKey(key);
    setKeyTestState(null);
    storage.set(API_KEY_KEY, key);
  };

  const saveWord = (word, gloss) => {
    if (isWordSaved(word)) return;
    const sentenceContext = tokens
      .map((t) => (t.type === "word" ? t.word : t.text))
      .join(" ")
      .replace(/ ([.,!?])/g, "$1");
    const newEntry = {
      word, gloss,
      savedAt: new Date().toISOString(),
      sentenceContext,
      storyId: activeStoryId,
      status: "learning",
    };
    persistWords([...savedWords, newEntry]);
  };

  const removeSavedWord = (word) => {
    persistWords(savedWords.filter((w) => w.word !== word));
  };

  const toggleWordStatus = (word) => {
    persistWords(savedWords.map((w) =>
      w.word === word ? { ...w, status: w.status === "known" ? "learning" : "known" } : w
    ));
  };

  const startFlashcards = () => {
    setFlashcards(shuffleArray(learningWords));
    setFlashIdx(0);
    setFlashFlipped(false);
    setView("flashcards");
  };

  const flashNext = () => {
    setFlashFlipped(false);
    setFlashIdx((i) => i + 1);
  };

  const flashPrev = () => {
    setFlashFlipped(false);
    setFlashIdx((i) => Math.max(0, i - 1));
  };

  const flashMarkKnown = () => {
    const card = flashcards[flashIdx];
    if (card) {
      toggleWordStatus(card.word);
      setFlashFlipped(false);
      setFlashIdx((i) => i + 1);
    }
  };

  const toggleArchive = (storyId) => {
    persistArchived(archivedIds.includes(storyId)
      ? archivedIds.filter((id) => id !== storyId)
      : [...archivedIds, storyId]);
  };

  const openStory = (id) => {
    setActiveStoryId(id);
    setSentenceIdx(0);
    setView("reader");
  };

  const backToMenu = () => {
    setView("menu");
    setActiveStoryId(null);
  };

  const nextSentence = () => {
    if (sentenceIdx < activeStory.sentences.length - 1) setSentenceIdx(sentenceIdx + 1);
  };

  const prevSentence = () => {
    if (sentenceIdx > 0) setSentenceIdx(sentenceIdx - 1);
  };

  const buildStoriesFromData = (data, sourceLabel, suffix = "") => {
    const items = Array.isArray(data) ? data : [data];
    if (items.length === 0) throw new Error("no stories found");
    const newStories = [];
    items.forEach((item, idx) => {
      try { validateStory(item); }
      catch (e) { throw new Error(`story ${idx + 1}: ${e.message}`); }
      newStories.push({
        ...item,
        source: sourceLabel,
        id: (item.id || "imported") + "-" + Date.now().toString(36) + "-" + suffix + idx,
      });
    });
    return newStories;
  };

  const handleImport = () => {
    setImportError(null);
    setImportSuccess(null);
    if (!importJson.trim()) { setImportError("paste some JSON first"); return; }
    let parsed;
    try { parsed = JSON.parse(importJson); }
    catch (e) { setImportError(`not valid JSON: ${e.message}`); return; }
    try {
      const newStories = buildStoriesFromData(parsed, "imported");
      persistStories([...stories, ...newStories]);
      setImportSuccess(`imported ${newStories.length} ${newStories.length === 1 ? "story" : "stories"}`);
      setImportJson("");
      setTimeout(() => { setShowImporter(false); setImportSuccess(null); }, 1200);
    } catch (e) { setImportError(e.message); }
  };

  const handleFileUpload = async (e) => {
    setImportError(null);
    setImportSuccess(null);
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    const allNewStories = [];
    const errors = [];
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      try {
        const text = await file.text();
        let parsed;
        try { parsed = JSON.parse(text); }
        catch (parseErr) { errors.push(`${file.name}: invalid JSON`); continue; }
        try {
          const built = buildStoriesFromData(parsed, "uploaded", `f${i}-`);
          allNewStories.push(...built);
        } catch (validErr) { errors.push(`${file.name}: ${validErr.message}`); }
      } catch (readErr) { errors.push(`${file.name}: could not read file`); }
    }
    if (fileInputRef.current) fileInputRef.current.value = "";
    if (allNewStories.length > 0) {
      persistStories([...stories, ...allNewStories]);
      setImportSuccess(`imported ${allNewStories.length} ${allNewStories.length === 1 ? "story" : "stories"}` + (errors.length ? ` (${errors.length} failed)` : ""));
      if (errors.length === 0) {
        setTimeout(() => { setShowImporter(false); setImportSuccess(null); }, 1200);
      }
    }
    if (errors.length > 0) setImportError(errors.join("; "));

  const handleExport = () => {

      exportedAt: new Date().toISOString(),
      stories: stories.filter((s) => s.source !== "seed"),

      archivedIds,

  const handleTestKey = async () => {

    setKeyTestState("testing");
    try {

      setKeyTestState(e.message);
    }
  };

  const handleGenerate = async () => {
    setGenerateError(null);
    setGenerateSuccess(null);
    if (!claudeApiKey.trim()) {
      setGenerateError("add your Anthropic API key in Settings first");
      return;
    }
    setGenerateLoading(true);
    try {
      let userMessage = generatePrompt.trim()
        ? `Write a Georgian language learning story for level ${generateDifficulty}. ${generatePrompt.trim()}`

        userMessage += `\n\nTry to naturally incorporate some of these words the learner is studying: ${sampledWords.map((w) => `${w.word} (${w.gloss})`).join(", ")}.`;
      }
      const rawText = await callClaude(claudeApiKey, userMessage, STORY_SYSTEM_PROMPT);
      let parsed;
      try {
        parsed = JSON.parse(stripJsonFences(rawText));
      } catch (e) {
        throw new Error("Claude returned invalid JSON. Please try again.");
      }
      const newStories = buildStoriesFromData(parsed, "generated");
      persistStories([...stories, ...newStories]);
      setGenerateSuccess(`generated: "${newStories[0].titleEn}"`);
      setGeneratePrompt("");
      setTimeout(() => { setShowGenerator(false); setGenerateSuccess(null); }, 1800);

                  {sampledWords.length === 0 && savedWords.filter((w) => w.status === "learning").length === 0 && (

                  {generateSuccess && (
                    <div style={{ fontSize: "12px", color: "#2a6e3f", fontFamily: "'DM Sans', sans-serif", padding: "10px", background: "rgba(42, 110, 63, 0.08)", borderRadius: "2px" }}>

                  )}
                  {generateError && (
                    <div style={{ fontSize: "12px", color: styles.wine, fontFamily: "'DM Sans', sans-serif", padding: "10px", background: "rgba(122, 31, 43, 0.08)", borderRadius: "2px" }}>

                          alignItems: "center", gap: "12px", opacity: 0.8,

        {view === "words" && (

                  {keyTestState === "testing" ? "testing…" : "test connection"}
                </button>
                {keyTestState && keyTestState !== "testing" && (
                  <span style={{
                    fontSize: "12px",
                    color: keyTestState === "ok" ? "#2a6e3f" : styles.wine,
                    fontFamily: "'DM Sans', sans-serif",
                  }}>
                    {keyTestState === "ok" ? "✓ key is valid" : `✗ ${keyTestState}`}
                  </span>
                )}
              </div>
              <div style={{ fontSize: "11px", color: styles.inkSoft, fontFamily: "'DM Sans', sans-serif", lineHeight: 1.6, borderTop: `1px solid ${styles.creamDark}`, paddingTop: "16px" }}>
                Get a key at console.anthropic.com. Usage is billed to your Anthropic account. Consider setting a monthly spending limit in the Anthropic Console.
              </div>
              <div style={{ borderTop: `1px solid ${styles.creamDark}`, paddingTop: "24px", marginTop: "8px" }}>
                <button onClick={handleExport} style={{
                  background: "transparent",
                  border: `1px solid ${styles.creamDark}`, borderRadius: "2px",
                  padding: "14px 20px", cursor: "pointer",
                  fontFamily: "'DM Sans', sans-serif", fontSize: "12px",
                  color: styles.inkSoft, letterSpacing: "0.1em",
                  textTransform: "uppercase", fontWeight: 600,
                  display: "flex", alignItems: "center", gap: "8px",
                }}>
                  <Download size={14} />
                  export backup
                </button>
                <div style={{ fontSize: "11px", color: styles.inkSoft, fontFamily: "'DM Sans', sans-serif", lineHeight: 1.6, marginTop: "10px" }}>
                  Saves all stories and vocabulary to a JSON file. Useful on iOS, where browser storage can be cleared after 7 weeks.
                </div>
              </div>
            </div>
          </div>
        )}

        {(view === "menu" || view === "words" || view === "settings") && (
          <nav style={{
            position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)",
            width: "100%", maxWidth: "480px",
            background: styles.cream,
            borderTop: `1px solid ${styles.creamDark}`,
            display: "flex", justifyContent: "space-around", alignItems: "center",
            padding: "10px 0 24px",
            zIndex: 100,
          }}>
            {[
              { id: "menu",     NavIcon: BookOpen,     label: "Stories"  },
              { id: "words",    NavIcon: Library,      label: "Words"    },
              { id: "settings", NavIcon: SettingsGear, label: "Settings" },
            ].map(({ id, NavIcon, label }) => (
              <button key={id} onClick={() => setView(id)} style={{
                background: "transparent", border: "none", cursor: "pointer",
                display: "flex", flexDirection: "column", alignItems: "center", gap: "4px",
                color: view === id ? styles.wine : styles.inkSoft,
                fontFamily: "'DM Sans', sans-serif", fontSize: "10px",
                letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 600,
                padding: "4px 16px", minWidth: "64px",
              }}>
                <NavIcon size={18} />
                {label}
              </button>
            ))}
          </nav>
        )}

        {view === "reader" && activeStory && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "32px", paddingTop: "8px" }}>
              <button onClick={backToMenu} style={{
                background: "transparent", border: "none",
                color: styles.inkSoft, cursor: "pointer",
                display: "flex", alignItems: "center", gap: "6px",
                fontFamily: "'DM Sans', sans-serif", fontSize: "13px", padding: "8px 0",
              }}>
                <ArrowLeft size={16} />
                stories
              </button>
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: "11px", letterSpacing: "0.15em", color: styles.gold, fontWeight: 600 }}>
                {sentenceIdx + 1} / {activeStory.sentences.length}
              </div>
            </div>

            <div style={{ display: "flex", gap: "3px", marginBottom: "48px" }}>
              {activeStory.sentences.map((_, i) => (
                <div key={i} style={{ flex: 1, height: "2px", background: i <= sentenceIdx ? styles.wine : styles.creamDark, transition: "background 0.3s" }} />
              ))}
            </div>

            <div style={{ minHeight: "240px", position: "relative" }}>
              <div style={{ fontSize: "11px", letterSpacing: "0.2em", textTransform: "uppercase", color: styles.gold, fontFamily: "'DM Sans', sans-serif", fontWeight: 600, marginBottom: "16px" }}>{activeStory.title}</div>

              <div style={{ fontSize: "30px", lineHeight: 1.5, color: styles.ink, marginBottom: "32px", fontWeight: 500 }}>
                {tokens.map((t, i) => {
                  if (t.type === "punct") return <span key={i}>{t.text}</span>;
                  const saved = isWordSaved(t.word);
                  const isActive = popup && popup.word === t.word;
                  const prevNeedsSpace = i > 0 && (tokens[i - 1].type === "word" || tokens[i - 1].type === "punct");
                  return (
                    <span key={i}>
                      {prevNeedsSpace && " "}
                      <span data-word onClick={(e) => {
                        e.stopPropagation();
                        const rect = e.currentTarget.getBoundingClientRect();
                        const containerRect = containerRef.current.getBoundingClientRect();
                        setPopup({
                          word: t.word, gloss: t.gloss,
                          left: rect.left - containerRect.left + rect.width / 2,
                          top: rect.bottom - containerRect.top + 8,
                        });
                      }} style={{
                        cursor: "pointer",
                        borderBottom: isActive
                          ? `2px solid ${styles.wine}`
                          : saved
                          ? `2px solid ${styles.gold}`
                          : `1px dotted ${styles.gold}`,
                        padding: "0 1px", transition: "all 0.15s",
                      }}>
                        {t.word}
                      </span>
                    </span>
                  );
                })}
              </div>

              {showTranslation && (
                <div style={{
                  fontSize: "16px", fontStyle: "italic",
                  color: styles.inkSoft,
                  fontFamily: "'Cormorant Garamond', serif",
                  paddingLeft: "16px",
                  borderLeft: `2px solid ${styles.gold}`,
                  marginBottom: "32px", lineHeight: 1.5,
                }}>
                  {sentence.english}
                </div>
              )}

              <button onClick={() => setShowTranslation(!showTranslation)} style={{
                background: "transparent",
                border: `1px solid ${styles.creamDark}`, borderRadius: "2px",
                padding: "12px 20px", cursor: "pointer",
                fontFamily: "'DM Sans', sans-serif", fontSize: "12px",
                color: styles.inkSoft, letterSpacing: "0.1em",
                textTransform: "uppercase",
                display: "inline-flex", alignItems: "center", gap: "8px",
                fontWeight: 500,
              }}>
                {showTranslation ? <EyeOff size={14} /> : <Eye size={14} />}
                {showTranslation ? "hide" : "show"} translation
              </button>
            </div>

            {popup && (
              <div data-popup style={{
                position: "absolute",
                left: Math.min(Math.max(popup.left, 140), 340),
                top: popup.top,
                transform: "translateX(-50%)",
                background: styles.ink, color: styles.cream,
                padding: "14px 16px", borderRadius: "2px",
                fontSize: "13px", fontFamily: "'DM Sans', sans-serif",
                width: "260px", zIndex: 100,
                boxShadow: "0 8px 24px rgba(42, 31, 23, 0.3)",
                lineHeight: 1.4,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "8px", marginBottom: "6px" }}>
                  <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "20px", fontWeight: 600, color: styles.cream }}>{popup.word}</div>
                  <button onClick={() => setPopup(null)} style={{
                    background: "transparent", border: "none",
                    color: styles.creamDark, cursor: "pointer",
                    padding: "2px", display: "flex",
                  }} aria-label="close">
                    <X size={14} />
                  </button>
                </div>
                <div style={{ color: styles.creamDark, marginBottom: "12px" }}>{popup.gloss}</div>
                <button onClick={() => {
                  if (popupWordSaved) removeSavedWord(popup.word);
                  else saveWord(popup.word, popup.gloss);
                }} style={{
                  width: "100%",
                  background: popupWordSaved ? styles.gold : "transparent",
                  color: popupWordSaved ? styles.ink : styles.gold,
                  border: `1px solid ${styles.gold}`, borderRadius: "2px",
                  padding: "10px", cursor: "pointer",
                  fontFamily: "'DM Sans', sans-serif", fontSize: "11px",
                  letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 600,
                  display: "flex", alignItems: "center", justifyContent: "center", gap: "6px",
                }}>
                  {popupWordSaved ? <Bookmark size={12} /> : <BookmarkPlus size={12} />}
                  {popupWordSaved ? "saved" : "save word"}
                </button>
              </div>
            )}
          </div>
        )}
      </div>

      {view === "reader" && activeStory && (
        <div style={{
          position: "fixed", bottom: 0, left: 0, right: 0,
          background: `linear-gradient(to top, ${styles.cream} 70%, transparent)`,
          padding: "20px 20px calc(32px + env(safe-area-inset-bottom))",
          display: "flex", justifyContent: "center", gap: "16px",
          maxWidth: "480px", margin: "0 auto",
        }}>
          <button onClick={prevSentence} disabled={sentenceIdx === 0} style={{
            flex: 1, maxWidth: "120px",
            background: "transparent",
            border: `1px solid ${styles.creamDark}`, borderRadius: "2px",
            padding: "16px",
            cursor: sentenceIdx === 0 ? "not-allowed" : "pointer",
            opacity: sentenceIdx === 0 ? 0.4 : 1,
            display: "flex", alignItems: "center", justifyContent: "center",
            color: styles.ink,
          }}>
            <ChevronLeft size={20} />
          </button>
          <button onClick={sentenceIdx === activeStory.sentences.length - 1 ? backToMenu : nextSentence} style={{
            flex: 1, maxWidth: "120px",
            background: styles.wine,
            border: `1px solid ${styles.wine}`, borderRadius: "2px",
            padding: "16px",
            cursor: "pointer",
            opacity: 1,
            display: "flex", alignItems: "center", justifyContent: "center",
            color: styles.cream,
          }}>
            {sentenceIdx === activeStory.sentences.length - 1
              ? <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: "13px", letterSpacing: "0.08em", fontWeight: 600 }}>done</span>
              : <ChevronRight size={20} />
            }
          </button>
        </div>
      )}
    </div>
  );
}

function FlashcardView({ cards, idx, flipped, styles, onFlip, onNext, onPrev, onMarkKnown, onBack }) {
  const card = cards[idx];
  const isComplete = idx >= cards.length;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "32px", paddingTop: "8px" }}>
        <button onClick={onBack} style={{
          background: "transparent", border: "none",
          color: styles.inkSoft, cursor: "pointer",
          display: "flex", alignItems: "center", gap: "6px",
          fontFamily: "'DM Sans', sans-serif", fontSize: "13px", padding: "8px 0",
        }}>
          <ArrowLeft size={16} />
          back
        </button>
        {!isComplete && (
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: "11px", letterSpacing: "0.15em", color: styles.gold, fontWeight: 600 }}>
            {idx + 1} of {cards.length}
          </div>
        )}
      </div>

      {isComplete ? (
        <div style={{ textAlign: "center", paddingTop: "80px" }}>
          <div style={{ fontSize: "48px", marginBottom: "24px", color: styles.gold }}>✓</div>
          <div style={{ fontSize: "24px", fontWeight: 600, color: styles.wine, fontFamily: "'Cormorant Garamond', Georgia, serif", marginBottom: "8px" }}>
            სწავლა დასრულდა
          </div>
          <div style={{ fontSize: "14px", color: styles.inkSoft, fontStyle: "italic", fontFamily: "'Cormorant Garamond', Georgia, serif", marginBottom: "40px" }}>
            session complete
          </div>
          <button onClick={onBack} style={{
            background: styles.wine, color: styles.cream,
            border: `1px solid ${styles.wine}`, borderRadius: "2px",
            padding: "14px 28px", cursor: "pointer",
            fontFamily: "'DM Sans', sans-serif", fontSize: "12px",
            letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 600,
          }}>
            back to words
          </button>
        </div>
      ) : (
        <React.Fragment>
          <div onClick={onFlip} style={{ perspective: "1000px", cursor: "pointer", marginBottom: "24px" }}>
            <div style={{
              position: "relative", minHeight: "280px",
              transformStyle: "preserve-3d",
              transform: flipped ? "rotateY(180deg)" : "rotateY(0deg)",
              transition: "transform 0.45s ease",
            }}>
              {/* Front */}
              <div style={{
                position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
                backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden",
                background: "rgba(255, 252, 245, 0.7)",
                border: `1px solid ${styles.creamDark}`, borderRadius: "2px",
                display: "flex", flexDirection: "column",
                alignItems: "center", justifyContent: "center",
                padding: "40px 32px",
              }}>
                <div style={{ fontSize: "52px", fontWeight: 600, color: styles.wine, fontFamily: "'Cormorant Garamond', Georgia, serif", textAlign: "center" }}>
                  {card.word}
                </div>
                <div style={{ fontSize: "11px", color: styles.inkSoft, marginTop: "28px", fontFamily: "'DM Sans', sans-serif", letterSpacing: "0.12em", textTransform: "uppercase" }}>
                  tap to reveal
                </div>
              </div>
              {/* Back */}
              <div style={{
                position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
                backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden",
                transform: "rotateY(180deg)",
                background: "rgba(255, 252, 245, 0.7)",
                border: `1px solid ${styles.creamDark}`, borderRadius: "2px",
                padding: "28px 32px",
                display: "flex", flexDirection: "column", justifyContent: "center",
              }}>
                <div style={{ fontSize: "36px", fontWeight: 600, color: styles.wine, fontFamily: "'Cormorant Garamond', Georgia, serif", marginBottom: "10px" }}>
                  {card.word}
                </div>
                <div style={{ fontSize: "15px", color: styles.ink, fontFamily: "'DM Sans', sans-serif", lineHeight: 1.5, marginBottom: "16px" }}>
                  {card.gloss}
                </div>
                {card.sentenceContext && (
                  <div style={{
                    fontSize: "13px", color: styles.inkSoft, fontStyle: "italic",
                    fontFamily: "'Cormorant Garamond', Georgia, serif",
                    borderLeft: `2px solid ${styles.gold}`, paddingLeft: "12px", lineHeight: 1.6,
                  }}>
                    {card.sentenceContext}
                  </div>
                )}
              </div>
            </div>
          </div>

          {flipped && (
            <div style={{ display: "flex", justifyContent: "center", marginBottom: "20px" }}>
              <button onClick={onMarkKnown} style={{
                background: "transparent", color: styles.gold,
                border: `1px solid ${styles.gold}`, borderRadius: "2px",
                padding: "10px 20px", cursor: "pointer",
                fontFamily: "'DM Sans', sans-serif", fontSize: "11px",
                letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 600,
                display: "flex", alignItems: "center", gap: "6px",
              }}>
                <Check size={12} />
                mark as known
              </button>
            </div>
          )}

          <div style={{ display: "flex", justifyContent: "center", gap: "12px" }}>
            <button onClick={onPrev} disabled={idx === 0} style={{
              flex: 1, maxWidth: "120px",
              background: "transparent", border: `1px solid ${styles.creamDark}`,
              borderRadius: "2px", padding: "16px",
              cursor: idx === 0 ? "not-allowed" : "pointer",
              opacity: idx === 0 ? 0.4 : 1,
              display: "flex", alignItems: "center", justifyContent: "center", color: styles.ink,
            }}>
              <ChevronLeft size={20} />
            </button>
            <button onClick={onNext} style={{
              flex: 1, maxWidth: "120px",
              background: styles.wine, color: styles.cream,
              border: `1px solid ${styles.wine}`, borderRadius: "2px",
              padding: "16px", cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>
              {idx === cards.length - 1
                ? <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: "13px", fontWeight: 600, letterSpacing: "0.08em" }}>done</span>
                : <ChevronRight size={20} />
              }
            </button>
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

function WordCard({ word, styles, onToggleStatus, onRemove, muted = false }) {
  return (
    <div style={{
      background: muted ? "rgba(255, 252, 245, 0.3)" : "rgba(255, 252, 245, 0.6)",
      border: `1px solid ${styles.creamDark}`, borderRadius: "2px",
      padding: "16px 18px",
      display: "flex", gap: "12px", alignItems: "flex-start",
      opacity: muted ? 0.75 : 1,
    }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: "22px", fontWeight: 600, color: styles.wine, marginBottom: "4px" }}>{word.word}</div>
        <div style={{ fontSize: "13px", color: styles.ink, fontFamily: "'DM Sans', sans-serif", marginBottom: "8px", lineHeight: 1.4 }}>{word.gloss}</div>
        {word.sentenceContext && (
          <div style={{ fontSize: "13px", color: styles.inkSoft, fontStyle: "italic", lineHeight: 1.4 }}>{word.sentenceContext}</div>
        )}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: "4px" }}>
        <button onClick={onToggleStatus} style={{
          background: "transparent", border: "none",
          color: word.status === "known" ? styles.gold : styles.inkSoft,
          cursor: "pointer", padding: "4px",
          display: "flex", alignItems: "center", justifyContent: "center",
        }} aria-label={word.status === "known" ? "mark as learning" : "mark as known"}>
          {word.status === "known" ? <RotateCcw size={16} /> : <Check size={16} />}
        </button>
        <button onClick={onRemove} style={{
          background: "transparent", border: "none",
          color: styles.inkSoft, cursor: "pointer", padding: "4px",
          display: "flex", alignItems: "center", justifyContent: "center",
        }} aria-label="remove">
          <Trash2 size={16} />
        </button>
      </div>
    </div>
  );
}

function ApiKeyInput({ value, onChange, styles }) {
  const [show, setShow] = React.useState(false);
  return (
    <div style={{ position: "relative" }}>
      <input
        type={show ? "text" : "password"}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder="sk-ant-..."
        autoComplete="off"
        spellCheck="false"
        style={{
          width: "100%", padding: "14px 44px 14px 14px",
          background: "rgba(255, 252, 245, 0.8)",
          border: `1px solid ${styles.creamDark}`, borderRadius: "2px",
          fontFamily: "monospace", fontSize: "13px",
          color: styles.ink, outline: "none",
        }}
      />
      <button onClick={() => setShow(!show)} style={{
        position: "absolute", right: "10px", top: "50%", transform: "translateY(-50%)",
        background: "transparent", border: "none",
        color: styles.inkSoft, cursor: "pointer", padding: "4px", display: "flex",
      }} aria-label={show ? "hide key" : "show key"}>
        {show ? <EyeOff size={16} /> : <Eye size={16} />}
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<GeorgianReader />);
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
